<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Proxy Test</title>
</head>
<body>
    <h1>Frontend Proxy Connection Test</h1>
    <button id="testProxy">Test Proxy Connection</button>
    <div id="result"></div>

    <script>
        document.getElementById('testProxy').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test basic connection through proxy
                const response = await fetch('/api/fertilizer/fertilizer-history', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0QGV4YW1wbGUuY29tIiwiZXhwIjoxNzMzMTE1MjUwfQ.3vBs7iO7HJY3gRVHf8WZ3g7ZqUqhWcYN3x3LnA5QCjk'
                    }
                });
                
                resultDiv.innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <p>Status Text: ${response.statusText}</p>
                    <p>Headers: ${JSON.stringify(Object.fromEntries(response.headers))}</p>
                `;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `<p>Data: ${JSON.stringify(data, null, 2)}</p>`;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML += `<p>Error: ${errorText}</p>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `<h3>Error:</h3><p>${error.message}</p>`;
                console.error('Proxy test error:', error);
            }
        });
    </script>
</body>
</html>
