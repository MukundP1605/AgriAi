<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAI Theme Toggle Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Additional custom styles */
        .theme-toggle {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background-color: #f3f4f6;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            background-color: #e5e7eb;
        }
        .theme-display {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .classic {
            background-color: #f9fafb;
            color: #111827;
            border: 1px solid #e5e7eb;
        }
        .futuristic {
            background-color: #111827;
            color: #f9fafb;
            border: 1px solid #374151;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // Create Theme Context
        const ThemeContext = createContext();

        // Theme Provider
        const ThemeProvider = ({ children }) => {
            const [theme, setTheme] = useState(() => {
                const savedTheme = localStorage.getItem('uiTheme');
                return savedTheme || 'classic';
            });

            const toggleTheme = () => {
                const newTheme = theme === 'classic' ? 'futuristic' : 'classic';
                setTheme(newTheme);
            };

            useEffect(() => {
                localStorage.setItem('uiTheme', theme);
                console.log('Theme changed to:', theme);
            }, [theme]);

            return (
                <ThemeContext.Provider value={{ theme, toggleTheme }}>
                    {children}
                </ThemeContext.Provider>
            );
        };

        // Custom hook
        const useTheme = () => {
            const context = useContext(ThemeContext);
            if (!context) {
                throw new Error('useTheme must be used within a ThemeProvider');
            }
            return context;
        };

        // Theme Toggle Button
        const ThemeToggle = () => {
            const { theme, toggleTheme } = useTheme();

            return (
                <button 
                    onClick={toggleTheme}
                    className="flex items-center px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors duration-200"
                >
                    <span className="mr-2">{theme === 'classic' ? '🌙' : '☀️'}</span>
                    <span className="text-sm font-medium">{theme === 'classic' ? 'Futuristic' : 'Classic'}</span>
                </button>
            );
        };

        // Navbar Component
        const Navbar = () => {
            const { theme } = useTheme();
            const [isUserMenuOpen, setIsUserMenuOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            
            const toggleUserMenu = () => {
                setIsUserMenuOpen(!isUserMenuOpen);
            };
            
            const toggleAuth = () => {
                setIsAuthenticated(!isAuthenticated);
            };
            
            return (
                <nav className={`sticky top-0 z-50 ${theme === 'classic' ? 'bg-white border-b border-gray-100 shadow-sm' : 'bg-gray-900 border-b border-gray-800 shadow-md'}`}>
                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex justify-between items-center">
                            {/* Logo */}
                            <div className="flex items-center space-x-3">
                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${theme === 'classic' ? 'bg-gradient-to-br from-green-500 to-green-600' : 'bg-gradient-to-br from-blue-500 to-indigo-600'}`}>
                                    <span className="text-white font-bold text-lg">🌱</span>
                                </div>
                                <span className={`text-xl font-bold ${theme === 'classic' ? 'text-green-600' : 'text-blue-400'}`}>
                                    AgriAI
                                </span>
                            </div>

                            {/* Navigation */}
                            <div className="flex items-center space-x-4">
                                <button 
                                    onClick={toggleAuth}
                                    className={`px-4 py-2 rounded-lg ${theme === 'classic' ? 'bg-green-100 text-green-700' : 'bg-indigo-900 text-indigo-200'}`}
                                >
                                    {isAuthenticated ? 'Log Out' : 'Log In'}
                                </button>
                                
                                {isAuthenticated ? (
                                    <div className="relative">
                                        <button 
                                            onClick={toggleUserMenu}
                                            className={`flex items-center space-x-2 ${theme === 'classic' ? 'text-gray-700' : 'text-gray-300'}`}
                                        >
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center ${theme === 'classic' ? 'bg-gray-100' : 'bg-gray-800'}`}>
                                                U
                                            </div>
                                            <span>User</span>
                                        </button>
                                        
                                        {isUserMenuOpen && (
                                            <div className={`absolute right-0 mt-2 w-48 rounded-md shadow-lg ${theme === 'classic' ? 'bg-white' : 'bg-gray-800'} ring-1 ring-black ring-opacity-5`}>
                                                <div className={`py-1 ${theme === 'classic' ? 'border-b border-gray-100' : 'border-b border-gray-700'}`}>
                                                    <div className="px-4 py-2">
                                                        <p className={theme === 'classic' ? 'text-gray-800' : 'text-gray-200'}>User</p>
                                                        <p className={theme === 'classic' ? 'text-gray-500' : 'text-gray-400'}>user@example.com</p>
                                                    </div>
                                                </div>
                                                <div className="py-1">
                                                    <div className="px-4 py-2">
                                                        <ThemeToggle />
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <ThemeToggle />
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // Content Component
        const Content = () => {
            const { theme } = useTheme();
            
            return (
                <div className={`min-h-screen ${theme === 'classic' ? 'bg-gray-50' : 'bg-gray-900'}`}>
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        <div className={`p-6 rounded-lg shadow-md ${theme === 'classic' ? 'bg-white' : 'bg-gray-800'}`}>
                            <h1 className={`text-2xl font-bold mb-4 ${theme === 'classic' ? 'text-gray-800' : 'text-white'}`}>
                                Current Theme: {theme.charAt(0).toUpperCase() + theme.slice(1)}
                            </h1>
                            <p className={theme === 'classic' ? 'text-gray-600' : 'text-gray-300'}>
                                This is a demonstration of the AgriAI {theme} theme. The toggle button in the navbar lets you switch between themes.
                            </p>
                            <div className="mt-6">
                                <h2 className={`text-xl font-semibold mb-3 ${theme === 'classic' ? 'text-gray-700' : 'text-gray-200'}`}>
                                    Features:
                                </h2>
                                <ul className={`list-disc pl-5 ${theme === 'classic' ? 'text-gray-600' : 'text-gray-300'}`}>
                                    <li>Theme is saved to localStorage</li>
                                    <li>UI adapts based on selected theme</li>
                                    <li>Toggle available for both logged-in and guest users</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // App Component
        const App = () => {
            return (
                <ThemeProvider>
                    <div className="flex flex-col min-h-screen">
                        <Navbar />
                        <Content />
                    </div>
                </ThemeProvider>
            );
        };

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
