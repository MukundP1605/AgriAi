<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer API Test</title>
</head>
<body>
    <h1>Fertilizer API Proxy Test</h1>
    <button id="testFertilizerAPI">Test Fertilizer AI Endpoint</button>
    <div id="result"></div>

    <script>
        document.getElementById('testFertilizerAPI').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing fertilizer API...';
            
            try {
                const testData = {
                    nitrogen: 45.0,
                    phosphorus: 25.0,
                    potassium: 35.0,
                    ph: 6.5,
                    moisture: 65.0,
                    organic_matter: 3.5,
                    location: "Test Farm, Test State",
                    crop_type: "wheat",
                    area_size: 2.5,
                    organic_preference: "chemical"
                };
                
                console.log('Testing fertilizer API endpoint...');
                
                const response = await fetch('/api/fertilizer/fertilizer-ai', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0QGV4YW1wbGUuY29tIiwiZXhwIjoxNzMzMTE1MjUwfQ.3vBs7iO7HJY3gRVHf8WZ3g7ZqUqhWcYN3x3LnA5QCjk'
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('Response received:', response.status, response.statusText);
                
                resultDiv.innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <p>Status Text: ${response.statusText}</p>
                    <p>Headers: ${JSON.stringify(Object.fromEntries(response.headers))}</p>
                `;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `
                        <h4>Analysis Results:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML += `<p>Error: ${errorText}</p>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `<h3>Network Error:</h3><p>${error.message}</p>`;
                console.error('Fertilizer API test error:', error);
            }
        });
    </script>
</body>
</html>
